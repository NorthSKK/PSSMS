<script>
// ==========================================
// 15. POR POR 5: SUBJECT CONFIG LOGIC
// ==========================================
function initSubjectConfigPage() {
  const user = getSessionUser();
  if(!user) return;
  document.getElementById('configTerm').value = user.currentTerm;
  document.getElementById('configYear').value = user.currentYear;
  const select = document.getElementById('configClassSelect'); select.innerHTML = `<option value="">⏳ กำลังโหลดวิชา...</option>`;
  const subjectCacheKey = `v2_subjects_${user.id}_${user.currentTerm}_${user.currentYear}`;
  const cachedSubjects = sessionStorage.getItem(subjectCacheKey);

  if (cachedSubjects && cachedSubjects !== "[]") { buildConfigSubjectDropdown(JSON.parse(cachedSubjects)); } 
  else {
     google.script.run.withFailureHandler(err => { select.innerHTML = `<option value="">❌ โหลดข้อมูลล้มเหลว</option>`; alert("Error: " + err.message); })
       .withSuccessHandler(subjects => { sessionStorage.setItem(subjectCacheKey, JSON.stringify(subjects)); buildConfigSubjectDropdown(subjects); })
       .getTeacherSubjects(user.id, user.role, user.currentTerm, user.currentYear);
  }
}

function buildConfigSubjectDropdown(subjects) {
  const select = document.getElementById('configClassSelect');
  if(subjects.length === 0) { select.innerHTML = `<option value="">⚠️ ไม่พบวิชาในเทอมนี้</option>`; return; }
  let html = '<option value="">-- เลือกรายวิชาที่ต้องการตั้งค่า --</option>';
  subjects.forEach(sub => { html += `<option value='${JSON.stringify(sub)}'>${sub[0]} - ${sub[1]} (${sub[2]})</option>`; });
  select.innerHTML = html;
}

function loadSubjectConfig() {
  const val = document.getElementById('configClassSelect').value;
  const panel = document.getElementById('configPanel');
  const info = document.getElementById('configSubjectInfo');
  if(!val) { panel.style.pointerEvents = 'none'; panel.classList.add('opacity-50'); info.classList.add('d-none'); return; }

  const item = JSON.parse(val); const user = getSessionUser();
  document.getElementById('dispConfigSubject').innerText = `${item[0]} ${item[1]}`;
  document.getElementById('dispConfigClass').innerText = `ห้อง ${item[2]}`;
  info.classList.remove('d-none'); panel.style.pointerEvents = 'auto'; panel.classList.remove('opacity-50');
  showLoader(true);
  
  google.script.run.withSuccessHandler(config => {
       showLoader(false); const tbody = document.getElementById('indicatorTableBody'); tbody.innerHTML = '';
       if (config) {
          const ratios = config.ratio.split(':');
          document.getElementById('scoreFormative').value = ratios[0] || 0; document.getElementById('scoreMidterm').value = ratios[1] || 0; document.getElementById('scoreFinal').value = ratios[2] || 0;
          if(config.indicators && config.indicators.length > 0) { config.indicators.forEach(ind => addIndicatorRow(ind.name, ind.score, ind.description || '')); } else { addIndicatorRow(); }
       } else {
          document.getElementById('scoreFormative').value = 70; document.getElementById('scoreMidterm').value = 10; document.getElementById('scoreFinal').value = 20; addIndicatorRow();
       }
       calculateTotalConfigScore();
    }).getSubjectConfig(item[0], item[2], user.currentTerm, user.currentYear);
}

function calculateTotalConfigScore() {
  const f = parseInt(document.getElementById('scoreFormative').value) || 0;
  const m = parseInt(document.getElementById('scoreMidterm').value) || 0;
  const e = parseInt(document.getElementById('scoreFinal').value) || 0;
  const total = f + m + e;
  const badge = document.getElementById('totalScoreBadge');
  badge.innerText = total;
  if(total === 100) { badge.className = 'text-success fs-5 fw-bold'; } else { badge.className = 'text-danger fs-5 fw-bold'; }
}

function saveSubjectConfigData() {
  const val = document.getElementById('configClassSelect').value;
  if(!val) return alert("กรุณาเลือกวิชา");
  const total = parseInt(document.getElementById('totalScoreBadge').innerText);
  if(total !== 100) { if(!confirm("⚠️ สัดส่วนคะแนนรวมยังไม่ครบ 100 คะแนน ต้องการบันทึกต่อไปหรือไม่?")) return; }

  const item = JSON.parse(val); const user = getSessionUser();
  const indicators = [];
  const rows = document.querySelectorAll('#indicatorTableBody tr');
  rows.forEach(row => {
    const name = row.querySelector('.ind-name').value.trim();
    const score = parseInt(row.querySelector('.ind-score').value) || 0;
    const description = row.querySelector('.ind-desc').value.trim(); // ดึงค่าจากช่องรายละเอียด
    if(name && score > 0) { 
      indicators.push({ name: name, score: score, description: description }); 
    }
  });

  const configData = { subjectCode: item[0], className: item[2], term: user.currentTerm, year: user.currentYear, formative: parseInt(document.getElementById('scoreFormative').value) || 0, midterm: parseInt(document.getElementById('scoreMidterm').value) || 0, final: parseInt(document.getElementById('scoreFinal').value) || 0, indicators: indicators, teacherId: user.id };
  const btn = document.getElementById('btnSaveConfig');
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังบันทึก...'; btn.disabled = true;

  safeRun(3)
    .withFailureHandler(err => {
       btn.innerHTML = '<i class="fas fa-save me-2"></i>บันทึกโครงสร้างวิชา'; btn.disabled = false;
       alert("❌ เกิดข้อผิดพลาด: " + err.message);
    })
    .withSuccessHandler(res => { btn.innerHTML = '<i class="fas fa-save me-2"></i>บันทึกโครงสร้างวิชา'; btn.disabled = false; alert(res.message); })
    .saveSubjectConfig(configData);
}

// ==========================================
// 16. POR POR 5: ALL-IN-ONE (สุดยอดระบบจัดการคะแนน)
// ==========================================

let currentScoreConfig = null;
let currentScoreStudents = [];
let currentAttStats = {};
let isHeaderEditMode = false;
let isQualVisible = false;
let isSavingScores = false;
let sgsColumnStates = {};

// 🌟 กุญแจมาตรฐาน (เกราะป้องกันรหัสเด็ก)
const normID = (id) => { let clean = String(id).replace(/[^a-zA-Z0-9]/g, '').replace(/^0+/, ''); return clean || '0'; };
const normStr = (str) => String(str).replace(/\s+/g, '').toLowerCase();

function initScoreEntryPage() {
  const user = getSessionUser();
  if(!user) return;
  const select = document.getElementById('scoreClassSelect');
  select.innerHTML = `<option value="">⏳ กำลังโหลดวิชา...</option>`;
  
  const subjectCacheKey = `v2_subjects_${user.id}_${user.currentTerm}_${user.currentYear}`;
  const cachedSubjects = sessionStorage.getItem(subjectCacheKey);

  if (cachedSubjects && cachedSubjects !== "[]") {
     buildScoreSubjectDropdown(JSON.parse(cachedSubjects));
  } else {
     google.script.run.withSuccessHandler(subjects => {
          sessionStorage.setItem(subjectCacheKey, JSON.stringify(subjects));
          buildScoreSubjectDropdown(subjects);
     }).getTeacherSubjects(user.id, user.role, user.currentTerm, user.currentYear);
  }
}

function buildScoreSubjectDropdown(subjects) {
  const select = document.getElementById('scoreClassSelect');
  if(subjects.length === 0) { select.innerHTML = `<option value="">⚠️ ไม่พบวิชาในเทอมนี้</option>`; return; }
  let html = '<option value="">-- เลือกรายวิชาที่ต้องการบันทึก --</option>';
  subjects.forEach(sub => { html += `<option value='${JSON.stringify(sub)}'>${sub[0]} - ${sub[1]} (${sub[2]})</option>`; });
  select.innerHTML = html;
}

function toggleHeaderEditMode() {
  const btnEdit = document.getElementById('btnEditHeader');
  if (!isHeaderEditMode) {
    isHeaderEditMode = true;
    btnEdit.className = "btn btn-sm btn-danger text-white rounded-pill px-3 fw-bold d-flex align-items-center shadow-sm";
    btnEdit.innerHTML = '<i class="fas fa-check me-1"></i> <span class="d-none d-xl-inline">เสร็จสิ้น</span>';
    refreshTableOnly();
  } else {
    if(confirm("💡 คุณอาจมีการปรับเปลี่ยนโครงสร้างหรือตัวชี้วัด\nต้องการบันทึกข้อมูลลงระบบตอนนี้เลยหรือไม่?")) {
       saveAllInOneScores(); 
    } else {
       isHeaderEditMode = false;
       btnEdit.className = "btn btn-sm btn-light rounded-pill px-3 text-secondary fw-bold d-flex align-items-center";
       btnEdit.innerHTML = '<i class="fas fa-th me-1"></i> <span class="d-none d-xl-inline">หัวตาราง</span>';
       refreshTableOnly();
    }
  }
}

function toggleQualColumns() {
  isQualVisible = !isQualVisible;
  const btn = document.getElementById('btnToggleQual');
  if (isQualVisible) {
    btn.className = "btn btn-sm btn-info text-white rounded-pill px-3 fw-bold d-flex align-items-center shadow-sm";
    btn.innerHTML = '<i class="fas fa-eye-slash me-1"></i> <span class="d-none d-xl-inline">ซ่อน</span>';
  } else {
    btn.className = "btn btn-sm btn-light rounded-pill px-3 text-secondary fw-bold d-flex align-items-center";
    btn.innerHTML = '<i class="fas fa-eye me-1"></i> <span class="d-none d-xl-inline">ประเมิน</span>';
  }
  syncHeaderState(); 
  refreshTableOnly(); 
}

// ==========================================
// 🌟 โหลดข้อมูลคะแนนพร้อม Skeleton UX
// ==========================================
function loadScoreGrid() {
  const val = document.getElementById('scoreClassSelect').value;
  const gridCard = document.getElementById('scoreGridCard');
  const btnSave = document.getElementById('btnSaveScores');
  
  if(!val) {
    gridCard.classList.add('d-none');
    btnSave.disabled = true;
    return;
  }

  const item = JSON.parse(val);
  const user = getSessionUser();
  
  // 🌟 1. เปิดการ์ดตารางขึ้นมาทันที (ไม่ต้องมี showLoader จอดำแล้ว!)
  gridCard.classList.remove('d-none');
  btnSave.disabled = true; 
  document.getElementById('scoreGridTitle').innerHTML = `<i class="fas fa-spinner fa-spin me-2 text-primary"></i>กำลังซิงค์ข้อมูล ปพ.5...`;
  document.getElementById('scoreRatioBadge').innerText = "รอสักครู่";
  
  // 🌟 2. วาดตารางโครงกระดูก (Skeleton) หลอกตาผู้ใช้
  renderSkeletonTable();

  // 🌟 3. ยิงข้อมูลไปหลังบ้าน
  safeRun(3)
    .withFailureHandler(err => {
        document.getElementById('scoreTableBody').innerHTML = `<tr><td colspan="10" class="text-center text-danger p-5"><i class="fas fa-exclamation-triangle fa-2x mb-2"></i><br>โหลดข้อมูลไม่สำเร็จ: ${err.message}</td></tr>`;
        document.getElementById('scoreGridTitle').innerHTML = `เกิดข้อผิดพลาดในการโหลด`;
    })
    .withSuccessHandler(res => {
        // เมื่อข้อมูลมาถึง ค่อยเอาข้อมูลจริงไปทับ Skeleton
        btnSave.disabled = false;
        currentScoreConfig = res.config;
        currentScoreStudents = res.students;
        currentAttStats = res.attStats || {}; 
        renderAllInOneTable(res.students, res.config, res.existingScores, res.existingQuals);
    })
    .getAllInOneScoreGridData(item[0], item[2], user.currentTerm, user.currentYear);
}

// ==========================================
// 🦴 ฟังก์ชันสร้างกล่องเทากะพริบ (Skeleton Render)
// ==========================================
function renderSkeletonTable() {
  const thead = document.getElementById('scoreTableHeader');
  const tbody = document.getElementById('scoreTableBody');
  
  // สร้างหัวตารางปลอม
  thead.innerHTML = `<tr>
    <th class="p-3" style="width:40px;"><div class="skeleton-box" style="width:20px; height:20px;"></div></th>
    <th class="p-3" style="min-width: 170px;"><div class="skeleton-box" style="width:120px; height:20px;"></div></th>
    <th class="p-3"><div class="skeleton-box mx-auto" style="width:60px; height:20px;"></div></th>
    <th class="p-3"><div class="skeleton-box mx-auto" style="width:60px; height:20px;"></div></th>
    <th class="p-3"><div class="skeleton-box mx-auto" style="width:60px; height:20px;"></div></th>
    <th class="p-3"><div class="skeleton-box mx-auto" style="width:60px; height:20px;"></div></th>
    <th class="p-3"><div class="skeleton-box mx-auto" style="width:60px; height:20px;"></div></th>
  </tr>`;

  // สร้างแถวข้อมูลปลอม 5 แถว
  let skeletonRows = '';
  for(let i=0; i<5; i++) {
    skeletonRows += `<tr>
      <td class="text-center align-middle p-3"><div class="skeleton-box mx-auto" style="width:20px; height:20px;"></div></td>
      <td class="align-middle p-3">
        <div class="skeleton-box mb-2" style="width:140px; height:18px;"></div><br>
        <div class="skeleton-box" style="width:80px; height:12px;"></div>
      </td>
      <td class="text-center align-middle p-3"><div class="skeleton-box mx-auto" style="width:50px; height:30px;"></div></td>
      <td class="text-center align-middle p-3"><div class="skeleton-box mx-auto" style="width:50px; height:30px;"></div></td>
      <td class="text-center align-middle p-3"><div class="skeleton-box mx-auto" style="width:50px; height:30px;"></div></td>
      <td class="text-center align-middle p-3"><div class="skeleton-box mx-auto" style="width:50px; height:30px;"></div></td>
      <td class="text-center align-middle p-3"><div class="skeleton-box mx-auto" style="width:50px; height:30px;"></div></td>
    </tr>`;
  }
  tbody.innerHTML = skeletonRows;
}

function syncHeaderState() {
  if(!document.querySelector('.ind-name-edit')) return; 
  const newIndicators = [];
  const names = document.querySelectorAll('.ind-name-edit');
  const scores = document.querySelectorAll('.ind-score-edit');
  names.forEach((el, i) => {
    let oldDesc = (currentScoreConfig.indicators[i] && currentScoreConfig.indicators[i].description) ? currentScoreConfig.indicators[i].description : '';
    newIndicators.push({ 
       name: el.innerText.trim(), 
       score: parseFloat(scores[i].innerText) || 0,
       description: oldDesc
    });
  });
  currentScoreConfig.indicators = newIndicators;
  const f = parseFloat(document.getElementById('edit-ratio-f').innerText) || 0;
  const m = parseFloat(document.getElementById('edit-ratio-m').innerText) || 0;
  const e = parseFloat(document.getElementById('edit-ratio-e').innerText) || 0;
  currentScoreConfig.ratio = `${f}:${m}:${e}`;
}

function refreshTableOnly() {
  const tempScores = {};
  const tempQuals = {};
  
  if (currentScoreStudents && currentScoreStudents.length > 0) {
      currentScoreStudents.forEach(std => {
        const stdId = String(std[0]).trim();
        const safeStdId = normID(stdId); 
        
        const indNames = Array.from(document.querySelectorAll('.ind-name-edit')).map(el => el.innerText.trim());
        document.querySelectorAll(`.formative-std-${safeStdId}`).forEach((input, i) => {
          if(input.value !== '' && indNames[i]) {
             const safeIndName = normStr(`ind_${indNames[i]}`); 
             tempScores[`${safeStdId}_${safeIndName}`] = parseFloat(input.value);
          }
        });
        
        const m = document.querySelector(`.midterm-std-${safeStdId}`);
        if(m && m.value !== '') tempScores[`${safeStdId}_midterm`] = parseFloat(m.value);
        
        const mr = document.querySelector(`.midterm-re-std-${safeStdId}`);
        if(mr && mr.value !== '') tempScores[`${safeStdId}_midterm_re`] = parseFloat(mr.value);
        
        const f = document.querySelector(`.final-std-${safeStdId}`);
        if(f && f.value !== '') tempScores[`${safeStdId}_final`] = parseFloat(f.value);

        const rem = document.querySelector(`.remark-select[data-safeid="${safeStdId}"]`);
        if(rem && rem.value !== '') tempScores[`${safeStdId}_remark`] = rem.value;

        const qr = document.querySelector(`.qual-read[data-safeid="${safeStdId}"]`);
        const qc = document.querySelector(`.qual-char[data-safeid="${safeStdId}"]`);
        const qp = document.querySelector(`.qual-comp[data-safeid="${safeStdId}"]`);
        if(qr && qc && qp) tempQuals[safeStdId] = { read: qr.value, char: qc.value, comp: qp.value };
      });
  }
  renderAllInOneTable(currentScoreStudents, currentScoreConfig, tempScores, tempQuals); 
}

// 🌟 2. ฟังก์ชันวาดตาราง (แก้บัคการชนกันของระบบเวลาเรียน vs ระบบหมายเหตุ)
function renderAllInOneTable(students, config, existingScores, existingQuals) {
  const thead = document.getElementById('scoreTableHeader');
  const tbody = document.getElementById('scoreTableBody');
  const val = document.getElementById('scoreClassSelect').value;
  const item = JSON.parse(val);
  
  document.getElementById('scoreGridTitle').innerHTML = `ปพ.5: วิชา ${item[0]} ${item[1]} ห้อง ${item[2]}`;
  document.getElementById('scoreRatioBadge').innerText = `สัดส่วนปัจจุบัน ${config.ratio}`;

  let headHtml = `<tr>
    <th rowspan="2" class="align-middle text-center sticky-head-1 text-secondary border-end py-2" style="width:45px; font-size: 0.85rem; background-color: #f1f3f5;">ที่</th>
    <th rowspan="2" class="align-middle text-start sticky-head-2 text-secondary border-end px-3 py-2" style="min-width: 180px; font-size: 0.85rem; background-color: #f1f3f5;">รหัส / ชื่อ-สกุล</th>`;
  
  let subHeadHtml = `<tr>`;
  
  config.indicators.forEach((ind, idx) => {
    let deleteBtn = isHeaderEditMode ? `<button class="btn btn-xs btn-outline-danger p-0 px-1 border-0 ms-1" onclick="removeIndicator(${idx})"><i class="fas fa-times"></i></button>` : '';
    let iconColor = ind.description ? 'text-info' : 'text-secondary';
    
    let infoBtn = `<i class="fas fa-info-circle ${iconColor}" style="cursor: pointer; font-size: 0.85rem; transition: 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" onclick="showIndicatorEdit(${idx})" title="คลิกดู/แก้ไขรายละเอียด"></i>`;

    let colKey = `formative-${idx}`;
    let isChecked = sgsColumnStates[colKey] ? 'checked' : '';
    let cbHtml = `<input type="checkbox" class="form-check-input border-secondary shadow-sm m-0 sgs-col-toggle" style="cursor: pointer; width: 1.1em; height: 1.1em;" onchange="toggleScoreColumn('${colKey}', this.checked)" ${isChecked} title="ติ๊กเพื่อเปิดกรอกคะแนน">`;

    headHtml += `<th class="text-success border-bottom-0 align-middle py-2" style="font-size: 0.9rem;">
                   <div class="d-flex justify-content-center align-items-center">
                     <span contenteditable="${isHeaderEditMode}" class="ind-name-edit fw-bold text-truncate" data-idx="${idx}">${ind.name}</span>
                     ${deleteBtn}
                   </div>
                 </th>`;
                 
    subHeadHtml += `<th class="text-success small fw-normal align-middle border-bottom pb-2" style="background-color: #f8f9fa;">
                      <div class="d-flex justify-content-center align-items-center gap-1">
                        <span class="text-muted">(<span contenteditable="${isHeaderEditMode}" class="ind-score-edit fw-bold text-success" onblur="reCalcAllRows()">${ind.score}</span>)</span>
                        ${infoBtn}
                        <div class="ms-1 d-flex align-items-center">${cbHtml}</div>
                      </div>
                    </th>`;
  });
  
  if(isHeaderEditMode) headHtml += `<th rowspan="2" class="align-middle bg-light"><button class="btn btn-sm btn-light text-primary border shadow-sm px-2 py-0" onclick="addIndicator()"><i class="fas fa-plus"></i></button></th>`;

  const ratios = config.ratio.split(':');
  
  let mChecked = sgsColumnStates['midterm'] ? 'checked' : '';
  let mrChecked = sgsColumnStates['midterm-re'] ? 'checked' : '';
  let eChecked = sgsColumnStates['final'] ? 'checked' : '';

  let cbM = `<input type="checkbox" class="form-check-input border-secondary shadow-sm m-0 sgs-col-toggle" style="cursor: pointer; width: 1.1em; height: 1.1em;" onchange="toggleScoreColumn('midterm', this.checked)" ${mChecked} title="เปิดกรอกกลางภาค">`;
  let cbMR = `<input type="checkbox" class="form-check-input border-secondary shadow-sm m-0 sgs-col-toggle" style="cursor: pointer; width: 1.1em; height: 1.1em;" onchange="toggleScoreColumn('midterm-re', this.checked)" ${mrChecked} title="เปิดกรอกซ่อม">`;
  let cbE = `<input type="checkbox" class="form-check-input border-secondary shadow-sm m-0 sgs-col-toggle" style="cursor: pointer; width: 1.1em; height: 1.1em;" onchange="toggleScoreColumn('final', this.checked)" ${eChecked} title="เปิดกรอกปลายภาค">`;

  headHtml += `<th class="text-primary border-bottom-0 border-start col-highlight-f align-middle py-2" style="font-size: 0.9rem;">รวมเก็บ</th>
    <th class="text-warning text-dark border-bottom-0 col-highlight-m align-middle py-2" style="font-size: 0.9rem;">กลางภาค</th>
    <th class="text-danger border-bottom-0 border-start border-white col-highlight-mr align-middle py-2" style="opacity: 0.9; font-size: 0.9rem;">ซ่อม</th>
    <th class="text-danger border-bottom-0 border-start col-highlight-e align-middle py-2" style="font-size: 0.9rem;">ปลายภาค</th>
    <th class="text-dark border-bottom-0 border-start col-highlight-total align-middle py-2" style="font-size: 0.9rem;">รวม</th>
    <th class="text-success border-bottom-0 border-start col-highlight-grade align-middle py-2" style="font-size: 0.9rem;">เกรด</th>
    <th class="text-danger border-bottom-0 border-start col-highlight-mr align-middle py-2" style="font-size: 0.9rem;">หมายเหตุ</th>
    <th colspan="3" class="text-info text-dark border-start ${isQualVisible ? '' : 'd-none'} align-middle py-2" style="font-size: 0.9rem;">ประเมิน (0-3)</th></tr>`;
  
  subHeadHtml += `<th class="text-primary small fw-normal border-start col-highlight-f align-middle border-bottom pb-2" style="background-color: #f8f9fa;">(<span id="edit-ratio-f" class="fw-bold">${ratios[0] || 0}</span>)</th>
    <th class="text-warning text-dark small fw-normal col-highlight-m align-middle border-bottom pb-2" style="background-color: #f8f9fa;">
      <div class="d-flex justify-content-center align-items-center gap-1">
        <span class="text-muted">(<span id="edit-ratio-m" class="fw-bold text-warning text-dark" contenteditable="${isHeaderEditMode}" onblur="reCalcAllRows()">${ratios[1] || 0}</span>)</span>
        <div class="ms-1 d-flex align-items-center">${cbM}</div>
      </div>
    </th>
    <th class="text-danger small fw-normal border-start border-white col-highlight-mr align-middle border-bottom pb-2" style="opacity: 0.9; background-color: #f8f9fa;">
      <div class="d-flex justify-content-center align-items-center gap-1">
        <span class="text-muted">-</span>
        <div class="ms-1 d-flex align-items-center">${cbMR}</div>
      </div>
    </th>
    <th class="text-danger small fw-normal border-start col-highlight-e align-middle border-bottom pb-2" style="background-color: #f8f9fa;">
      <div class="d-flex justify-content-center align-items-center gap-1">
        <span class="text-muted">(<span id="edit-ratio-e" class="fw-bold text-danger" contenteditable="${isHeaderEditMode}" onblur="reCalcAllRows()">${ratios[2] || 0}</span>)</span>
        <div class="ms-1 d-flex align-items-center">${cbE}</div>
      </div>
    </th>
    <th class="text-dark small fw-normal border-start col-highlight-total align-middle border-bottom pb-2" style="background-color: #f8f9fa;">(<span id="edit-ratio-total" class="fw-bold">100</span>)</th>
    <th class="text-success small fw-normal border-start col-highlight-grade align-middle border-bottom pb-2 fw-bold" style="background-color: #f8f9fa;">0-4</th>
    <th class="text-danger small fw-normal border-start col-highlight-mr align-middle border-bottom pb-2" style="background-color: #f8f9fa;">(ร, มส)</th>
    <th class="text-info small fw-normal border-start ${isQualVisible ? '' : 'd-none'} align-middle border-bottom pb-2" style="background-color: #f8f9fa;">อ่าน</th>
    <th class="text-info small fw-normal ${isQualVisible ? '' : 'd-none'} align-middle border-bottom pb-2" style="background-color: #f8f9fa;">คุณฯ</th>
    <th class="text-info small fw-normal ${isQualVisible ? '' : 'd-none'} align-middle border-bottom pb-2" style="background-color: #f8f9fa;">สมรรถนะ</th></tr>`;
  
  thead.innerHTML = headHtml + subHeadHtml;

  let bodyHtml = '';
  students.sort((a, b) => String(a[0]).localeCompare(String(b[0])));

  students.forEach((std, rowIndex) => {
    const stdId = String(std[0]).trim();
    const safeStdId = normID(stdId); 
    let colIndex = 0; 
    
    let pct = currentAttStats[safeStdId];
    let attText = '';
    let autoMS = false;

    // 🌟 ดึงข้อมูลจากฐานข้อมูล ถ้าฐานข้อมูลเป็นเครื่องหมาย - (แปลว่าครูจงใจลบ) ให้เก็บสถานะไว้
    let rawRemark = (existingScores[`${safeStdId}_remark`] !== undefined) ? existingScores[`${safeStdId}_remark`] : '';
    let remarkVal = rawRemark;
    
    if (pct !== undefined) {
        attText = `<span class="ms-2 fw-bold ${pct < 80 ? 'text-danger' : 'text-success'}" style="font-size: 0.72rem; letter-spacing:-0.3px;"><i class="fas fa-user-clock me-1"></i>${pct}%</span>`;
        // 🚨 ป้องกันระบบชนกัน: ให้ มส. อัตโนมัติ เฉพาะคนที่ "ยังไม่เคยถูกครูกดบันทึกช่องหมายเหตุเลย" เท่านั้น (rawRemark ต้องว่างจริงๆ ไม่ใช่เครื่องหมายขีด)
        if (pct < 80 && rawRemark === '') { 
            remarkVal = 'มส'; 
            autoMS = true; 
        }
    }
    
    // ถ้าครูเคยจงใจลบออกจนเหลือ - ให้แสดงผลหน้าเว็บเป็นช่องว่าง (ครูจะได้มองสบายตา)
    if (remarkVal === '-') remarkVal = '';
    
    bodyHtml += `<tr>
      <td class="text-center text-muted fw-bold sticky-col-1 align-middle border-end" style="font-size:0.85rem; background-color: #fff;">${rowIndex + 1}</td>
      <td class="text-start sticky-col-2 align-middle px-3 border-end" style="background-color: #fff;">
         <div class="fw-bold text-dark text-truncate" style="max-width: 170px; font-size: 0.9rem; line-height:1.2;">${std[2]}</div>
         <div class="d-flex align-items-center mt-1">
            <span class="text-muted font-monospace" style="font-size: 0.78rem;">${stdId}</span>
            ${attText}
         </div>
      </td>`;
    
    config.indicators.forEach((ind, idx) => {
      const indName = normStr(`ind_${ind.name}`);
      const scoreKey = `${safeStdId}_${indName}`; 
      const val = (existingScores[scoreKey] !== undefined && existingScores[scoreKey] !== "") ? existingScores[scoreKey] : '';
      
      let colKey = `formative-${idx}`;
      let lockState = sgsColumnStates[colKey] ? '' : 'readonly tabindex="-1"';
      let bgStyle = sgsColumnStates[colKey] ? 'background:transparent;' : 'background:#e9ecef; opacity:0.6;';

      bodyHtml += `<td class="p-0 align-middle text-center" title="คลิกขวาเพื่อดูประวัติ">
                     <input type="number" class="score-cell-input nav-input formative-std-${safeStdId} sgs-col-${colKey}" style="${bgStyle}" value="${val}" data-row="${rowIndex}" data-col="${colIndex++}" onkeydown="handleCellNav(event)" onkeyup="calcRow('${stdId}', '${safeStdId}')" oncontextmenu="viewScoreHistory(event, '${stdId}', '${std[2]}', '${indName}', '${ind.name}'); return false;" ${lockState}>
                   </td>`;
    });

    if(isHeaderEditMode) bodyHtml += `<td class="bg-light"></td>`;

    const midVal = (existingScores[`${safeStdId}_midterm`] !== undefined && existingScores[`${safeStdId}_midterm`] !== "") ? existingScores[`${safeStdId}_midterm`] : '';
    const midReVal = (existingScores[`${safeStdId}_midterm_re`] !== undefined && existingScores[`${safeStdId}_midterm_re`] !== "") ? existingScores[`${safeStdId}_midterm_re`] : ''; 
    const finVal = (existingScores[`${safeStdId}_final`] !== undefined && existingScores[`${safeStdId}_final`] !== "") ? existingScores[`${safeStdId}_final`] : '';
    
    let mLock = sgsColumnStates['midterm'] ? '' : 'readonly tabindex="-1"';
    let mBg = sgsColumnStates['midterm'] ? 'background:transparent;' : 'background:#e9ecef; opacity:0.6;';
    let mrLock = sgsColumnStates['midterm-re'] ? '' : 'readonly tabindex="-1"';
    let mrBg = sgsColumnStates['midterm-re'] ? 'background:transparent;' : 'background:#e9ecef; opacity:0.6;';
    let eLock = sgsColumnStates['final'] ? '' : 'readonly tabindex="-1"';
    let eBg = sgsColumnStates['final'] ? 'background:transparent;' : 'background:#e9ecef; opacity:0.6;';

    const q = existingQuals[safeStdId] || { read: "3", char: "3", comp: "3" };
    const opt = `<option value="3">3</option><option value="2">2</option><option value="1">1</option><option value="0">0</option>`;

    bodyHtml += `<td class="p-0 align-middle text-center border-start col-highlight-f"><input type="text" class="score-cell-input fw-bold text-primary" style="background:transparent;" id="sum_f_std_${safeStdId}" value="0" readonly tabindex="-1"></td>
      
      <td class="p-0 align-middle text-center col-highlight-m" title="คลิกขวาเพื่อดูประวัติ">
        <input type="number" class="score-cell-input nav-input midterm-std-${safeStdId} sgs-col-midterm" style="${mBg}" value="${midVal}" data-row="${rowIndex}" data-col="${colIndex++}" onkeydown="handleCellNav(event)" onkeyup="calcRow('${stdId}', '${safeStdId}')" oncontextmenu="viewScoreHistory(event, '${stdId}', '${std[2]}', 'midterm', 'กลางภาค'); return false;" ${mLock}>
      </td>
      
      <td class="p-0 align-middle text-center border-start border-white col-highlight-mr" title="คลิกขวาเพื่อดูประวัติ">
        <input type="number" class="score-cell-input nav-input midterm-re-std-${safeStdId} text-danger fw-bold sgs-col-midterm-re" style="${mrBg}" value="${midReVal}" placeholder="-" data-row="${rowIndex}" data-col="${colIndex++}" onkeydown="handleCellNav(event)" onkeyup="calcRow('${stdId}', '${safeStdId}')" oncontextmenu="viewScoreHistory(event, '${stdId}', '${std[2]}', 'midterm_re', 'สอบซ่อม'); return false;" ${mrLock}>
      </td>
      
      <td class="p-0 align-middle text-center border-start col-highlight-e" title="คลิกขวาเพื่อดูประวัติ">
        <input type="number" class="score-cell-input nav-input final-std-${safeStdId} sgs-col-final" style="${eBg}" value="${finVal}" data-row="${rowIndex}" data-col="${colIndex++}" onkeydown="handleCellNav(event)" onkeyup="calcRow('${stdId}', '${safeStdId}')" oncontextmenu="viewScoreHistory(event, '${stdId}', '${std[2]}', 'final', 'ปลายภาค'); return false;" ${eLock}>
      </td>
      
      <td class="text-center align-middle text-dark fw-bold border-start col-highlight-total" id="sum_total_std_${safeStdId}" style="font-size: 0.95rem;">0</td>
      <td class="text-center align-middle text-success fw-bold border-start col-highlight-grade" id="grade_std_${safeStdId}" style="font-size: 1rem;">0</td>
      
      <td class="p-0 align-middle text-center border-start col-highlight-mr position-relative">
        <select class="qual-select remark-select nav-input" data-row="${rowIndex}" data-col="${colIndex++}" data-safeid="${safeStdId}" onkeydown="handleCellNav(event)" onchange="calcRow('${stdId}', '${safeStdId}'); updateRemarkInstant('${stdId}', this);" style="width: 100%; height:100%; background: transparent; padding:4px; font-size: 0.85rem; border:none; outline:none; text-align:center;">
          <option value="" ${remarkVal === '' ? 'selected' : ''}>-</option>
          <option value="ร" ${remarkVal === 'ร' ? 'selected' : ''}>ร</option>
          <option value="มส" ${remarkVal === 'มส' ? 'selected' : ''}>มส</option>
        </select>
        ${autoMS ? '<div class="text-danger fw-bold position-absolute" style="font-size: 0.45rem; top: 1px; right: 2px; text-align: center;"><i class="fas fa-robot"></i></div>' : ''}
      </td>
      
      <td class="p-0 align-middle text-center border-start ${isQualVisible ? '' : 'd-none'}"><select class="qual-select qual-read nav-input w-100 h-100 border-0 text-center" data-row="${rowIndex}" data-col="${colIndex++}" onkeydown="handleCellNav(event)" data-safeid="${safeStdId}">${opt.replace(`value="${q.read}"`, `value="${q.read}" selected`)}</select></td>
      <td class="p-0 align-middle text-center ${isQualVisible ? '' : 'd-none'}"><select class="qual-select qual-char nav-input w-100 h-100 border-0 text-center" data-row="${rowIndex}" data-col="${colIndex++}" onkeydown="handleCellNav(event)" data-safeid="${safeStdId}">${opt.replace(`value="${q.char}"`, `value="${q.char}" selected`)}</select></td>
      <td class="p-0 align-middle text-center ${isQualVisible ? '' : 'd-none'}"><select class="qual-select qual-comp nav-input w-100 h-100 border-0 text-center" data-row="${rowIndex}" data-col="${colIndex++}" onkeydown="handleCellNav(event)" data-safeid="${safeStdId}">${opt.replace(`value="${q.comp}"`, `value="${q.comp}" selected`)}</select></td>
    </tr>`;
  });
  tbody.innerHTML = bodyHtml;
  reCalcAllRows();
}

// 🌟 5. ฟังก์ชันเปิด/ปิด ล็อกเมื่อครูติ๊กบนหัวตาราง (อัปเดตให้ใช้ readOnly)
window.toggleScoreColumn = function(colKey, isChecked) {
    sgsColumnStates[colKey] = isChecked; 
    
    const inputs = document.querySelectorAll(`.sgs-col-${colKey}`);
    inputs.forEach(input => {
        // 🚨 สลับใช้ readOnly แทน disabled 
        input.readOnly = !isChecked;
        if (!isChecked) {
            input.setAttribute('tabindex', '-1'); // ข้ามเมื่อกดปุ่ม Tab
            input.style.backgroundColor = '#e9ecef';
            input.style.opacity = '0.6';
        } else {
            input.removeAttribute('tabindex');
            input.style.backgroundColor = 'transparent';
            input.style.opacity = '1';
        }
    });
    
    // เด้งโฟกัสไปที่นักเรียนคนแรกทันที เพื่อให้พิมพ์ต่อได้เลย
    if (isChecked && inputs.length > 0) {
        setTimeout(() => inputs[0].focus(), 50);
    }
}

function calculateGrade(score) {
  if (score >= 80) return "4";
  if (score >= 75) return "3.5";
  if (score >= 70) return "3";
  if (score >= 65) return "2.5";
  if (score >= 60) return "2";
  if (score >= 55) return "1.5";
  if (score >= 50) return "1";
  return "0";
}

function reCalcAllRows() {
  let sumFormativeMax = 0;
  document.querySelectorAll('.ind-score-edit').forEach(el => { sumFormativeMax += parseFloat(el.innerText) || 0; });
  const fEl = document.getElementById('edit-ratio-f');
  if(fEl) fEl.innerText = sumFormativeMax;

  const f = sumFormativeMax; 
  const m = parseFloat(document.getElementById('edit-ratio-m').innerText) || 0;
  const e = parseFloat(document.getElementById('edit-ratio-e').innerText) || 0;
  const totalRatio = f + m + e;
  
  const totEl = document.getElementById('edit-ratio-total');
  if(totEl) {
     totEl.innerText = totalRatio;
     totEl.style.color = (totalRatio !== 100) ? 'red' : ''; 
  }

  currentScoreStudents.forEach(std => {
      calcRow(String(std[0]).trim(), normID(std[0]));
  });
}

let autoSaveTimer = null; 
let retrySaveTimer = null;

// ==========================================
// 🧮 ฟังก์ชันคำนวณคะแนนและตัดเกรด (ฉบับจัดเต็มของคุณครู)
// ==========================================
function calcRow(stdId, safeStdId) {
  if (!safeStdId) safeStdId = normID(stdId);

  let sumFormative = 0;
  const maxScores = Array.from(document.querySelectorAll('.ind-score-edit')).map(el => parseFloat(el.innerText) || 0);
  const maxM = parseFloat(document.getElementById('edit-ratio-m').innerText) || 0;
  const maxE = parseFloat(document.getElementById('edit-ratio-e').innerText) || 0;
  
  document.querySelectorAll(`.formative-std-${safeStdId}`).forEach((input, i) => {
    const val = parseFloat(input.value) || 0;
    input.style.color = val > (maxScores[i] || 0) ? 'red' : '';
    sumFormative += val;
  });
  
  const sumEl = document.getElementById(`sum_f_std_${safeStdId}`);
  if(sumEl) sumEl.value = sumFormative;
  
  const midInput = document.querySelector(`.midterm-std-${safeStdId}`);
  const midReInput = document.querySelector(`.midterm-re-std-${safeStdId}`);
  const midVal = midInput && midInput.value !== '' ? parseFloat(midInput.value) : 0;
  const midReVal = midReInput && midReInput.value !== '' ? parseFloat(midReInput.value) : NaN; 
  
  let effectiveMidterm = midVal; 
  if (midInput && midReInput) {
      if (!isNaN(midReVal)) {
         effectiveMidterm = midReVal;
         midInput.style.textDecoration = "line-through";
         midInput.style.opacity = "0.4";
      } else {
         midInput.style.textDecoration = "none";
         midInput.style.opacity = "1";
      }
      midInput.style.color = midVal > maxM ? 'red' : '';
      midReInput.style.color = effectiveMidterm > maxM ? 'red' : '#dc3545';
  }
  
  const finInput = document.querySelector(`.final-std-${safeStdId}`);
  const finVal = finInput && finInput.value !== '' ? parseFloat(finInput.value) : 0;
  if (finInput) finInput.style.color = finVal > maxE ? 'red' : '';

  const total = sumFormative + effectiveMidterm + finVal;
  const totalCell = document.getElementById(`sum_total_std_${safeStdId}`);
  const gradeCell = document.getElementById(`grade_std_${safeStdId}`);
  if(totalCell) totalCell.innerText = total;

  // 🚨 ดึงค่าจาก Dropdown หมายเหตุ (ร/มส) แบบแข็งแกร่ง
  const remarkSelect = document.querySelector(`.remark-select[data-safeid="${safeStdId}"]`);
  const remark = remarkSelect ? remarkSelect.value.trim() : '';

  if (remarkSelect) {
      if(remark === 'ร' || remark === 'มส') remarkSelect.classList.add('text-danger', 'fw-bold');
      else remarkSelect.classList.remove('text-danger', 'fw-bold');
  }

  if(gradeCell && totalCell) {
      // 🌟 บังคับเด็ดขาด: ถ้าหมายเหตุเป็น ร หรือ มส ให้ทับเกรดทันที!
      if (remark === 'ร' || remark === 'มส') {
         gradeCell.innerText = remark;
         totalCell.className = "text-center align-middle text-white fw-bold fs-6 border-start bg-danger";
         gradeCell.className = "text-center align-middle text-white fw-bold fs-5 border-start bg-danger";
      } else {
         // ตัดเกรดปกติตามคะแนน
         gradeCell.innerText = typeof calculateGrade === 'function' ? calculateGrade(total) : "0";
         if(total < 50) { 
           totalCell.className = "text-center align-middle text-white fw-bold fs-6 border-start bg-danger";
           gradeCell.className = "text-center align-middle text-white fw-bold fs-5 border-start bg-danger"; 
         } else { 
           totalCell.className = "text-center align-middle text-dark fw-bold fs-6 border-start col-highlight-total";
           gradeCell.className = "text-center align-middle text-success fw-bold fs-5 border-start col-highlight-grade";
         }
      }
  }

  // ระบบ Auto-save 3 วิ
  const btn = document.getElementById('btnSaveScores');
  if (typeof isHeaderEditMode !== 'undefined' && !isHeaderEditMode && btn) {
      if (typeof autoSaveTimer !== 'undefined') clearTimeout(autoSaveTimer);
      btn.innerHTML = '<i class="fas fa-hourglass-half fa-spin me-2"></i>รอเซฟ (3 วิ)...';
      btn.className = "btn btn-outline-warning text-dark shadow-sm px-4 fw-bold"; 
      autoSaveTimer = setTimeout(() => { 
          if (typeof saveAllInOneScores === 'function') saveAllInOneScores(true); 
      }, 3000); 
  }
}

// 🌟 1. ฟังก์ชันบันทึกคะแนนทั้งหมด (แก้ไขให้ส่ง ร/มส ไปพร้อมกับเกรด)
function saveAllInOneScores(isSilent = false) {
  if(isSavingScores) {
      if(isSilent) {
          clearTimeout(retrySaveTimer);
          retrySaveTimer = setTimeout(() => saveAllInOneScores(true), 1500);
      }
      return; 
  }
  isSavingScores = true;

  const val = document.getElementById('scoreClassSelect').value;
  const btn = document.getElementById('btnSaveScores');
  const originalBtnClass = "btn btn-primary rounded-pill shadow-sm px-4 fw-bold";
  const originalText = '<i class="fas fa-save me-2"></i>บันทึกข้อมูลทั้งหมด';

  if(!val) { isSavingScores = false; return; }
  const item = JSON.parse(val);
  const user = getSessionUser();
  
  const f = parseFloat(document.getElementById('edit-ratio-f').innerText) || 0;
  const m = parseFloat(document.getElementById('edit-ratio-m').innerText) || 0;
  const e = parseFloat(document.getElementById('edit-ratio-e').innerText) || 0;
  
  if((f + m + e) !== 100) {
     if(!isSilent) {
        if(!confirm("⚠️ สัดส่วนคะแนนรวมกันไม่เท่ากับ 100 ต้องการบันทึกต่อหรือไม่?")) { isSavingScores = false; return; }
     } else {
        if(btn) { btn.innerHTML = originalText; btn.className = originalBtnClass; }
        isSavingScores = false; return; 
     }
  }

  if (!isSilent && btn) {
     btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังบันทึก...';
     btn.className = originalBtnClass;
     btn.disabled = true;
  } else if (btn) {
     btn.innerHTML = '<i class="fas fa-sync fa-spin me-2"></i>กำลัง Auto-Save...';
     btn.className = "btn btn-info text-white shadow-sm px-4 fw-bold";
  }

  try {
      const newIndicators = [];
      const names = document.querySelectorAll('.ind-name-edit');
      const scores = document.querySelectorAll('.ind-score-edit');
      names.forEach((el, i) => {
        newIndicators.push({ name: el.innerText.trim(), score: parseFloat(scores[i].innerText) || 0 });
      });

      currentScoreConfig.indicators = newIndicators;
      currentScoreConfig.ratio = `${f}:${m}:${e}`;

      const payload = {
        subjectCode: item[0], className: item[2], term: user.currentTerm, year: user.currentYear, teacherId: user.id,
        newConfig: { formative: f, midterm: m, final: e, indicators: newIndicators },
        scoreRecords: [], qualRecords: [], gradeRecords: []
      };

      currentScoreStudents.forEach(std => {
        const stdId = String(std[0]).trim();
        const safeStdId = normID(stdId); 
        
        // เก็บข้อมูลคะแนนดิบ
        document.querySelectorAll(`.formative-std-${safeStdId}`).forEach((input, i) => {
          const indName = normStr(`ind_${newIndicators[i].name}`);
          const val = input.value !== '' ? parseFloat(input.value) : ''; 
          payload.scoreRecords.push({ studentId: stdId, subjectCode: item[0], term: user.currentTerm, year: user.currentYear, indicatorId: indName, score: val });
        });

        const midInput = document.querySelector(`.midterm-std-${safeStdId}`);
        if (midInput) payload.scoreRecords.push({ studentId: stdId, subjectCode: item[0], term: user.currentTerm, year: user.currentYear, indicatorId: 'midterm', score: midInput.value !== '' ? parseFloat(midInput.value) : '' });

        const midReInput = document.querySelector(`.midterm-re-std-${safeStdId}`);
        if (midReInput) payload.scoreRecords.push({ studentId: stdId, subjectCode: item[0], term: user.currentTerm, year: user.currentYear, indicatorId: 'midterm_re', score: midReInput.value !== '' ? parseFloat(midReInput.value) : '' });

        const finInput = document.querySelector(`.final-std-${safeStdId}`);
        if (finInput) payload.scoreRecords.push({ studentId: stdId, subjectCode: item[0], term: user.currentTerm, year: user.currentYear, indicatorId: 'final', score: finInput.value !== '' ? parseFloat(finInput.value) : '' });

        // 🚨 ดึงค่า ร/มส 
        const remarkInput = document.querySelector(`.remark-select[data-safeid="${safeStdId}"]`);
        const remarkVal = remarkInput ? remarkInput.value.trim() : '';
        const finalRemark = remarkVal === '' ? '-' : remarkVal; // แปลงค่าว่างให้เป็น - เพื่อให้ระบบจำ

        // 🌟 1. ยัดลง Score_Database (เพื่อให้เก็บเป็นประวัติรายตัวชี้วัดด้วย)
        payload.scoreRecords.push({ studentId: stdId, subjectCode: item[0], term: user.currentTerm, year: user.currentYear, indicatorId: 'remark', score: finalRemark });

        // 🌟 2. ยัดลง Grade_Summary 
        const tCell = document.getElementById(`sum_total_std_${safeStdId}`);
        const gCell = document.getElementById(`grade_std_${safeStdId}`);
        payload.gradeRecords.push({ 
            studentId: stdId, 
            subjectCode: item[0], 
            totalScore: tCell ? tCell.innerText : '0', 
            grade: gCell ? gCell.innerText : '0',
            remark: finalRemark // ยัด ร/มส มาตรงนี้
        });
        
        const qRead = document.querySelector(`.qual-read[data-safeid="${safeStdId}"]`);
        const qChar = document.querySelector(`.qual-char[data-safeid="${safeStdId}"]`);
        const qComp = document.querySelector(`.qual-comp[data-safeid="${safeStdId}"]`);
        
        payload.qualRecords.push({ studentId: stdId, subjectCode: item[0], term: user.currentTerm, year: user.currentYear, read: qRead ? qRead.value : '3', char: qChar ? qChar.value : '3', comp: qComp ? qComp.value : '3' });
      });

      safeRun(3)
        .withFailureHandler(err => {
          isSavingScores = false; 
          if(btn) { btn.disabled = false; btn.innerHTML = originalText; btn.className = originalBtnClass; }
          if(!isSilent) alert("❌ ขัดข้องที่ระบบเซิร์ฟเวอร์: " + err.message);
        })
        .withSuccessHandler(res => {
          isSavingScores = false; 
          if(btn) { btn.disabled = false; btn.innerHTML = originalText; btn.className = originalBtnClass; }
          
          document.getElementById('scoreRatioBadge').innerText = `สัดส่วนปัจจุบัน ${f}:${m}:${e}`;

          if (!isSilent) {
             let wasInEditMode = isHeaderEditMode;
             isHeaderEditMode = false;
             const btnEdit = document.getElementById('btnEditHeader');
             if(btnEdit) {
                btnEdit.className = "btn btn-outline-primary shadow-sm px-3 fw-bold me-2";
                btnEdit.innerHTML = '<i class="fas fa-th me-2"></i>แก้ไขหัวตาราง';
             }
             showToast("บันทึกข้อมูลคะแนนเรียบร้อยแล้ว", "success");
             if(wasInEditMode) refreshTableOnly(); 
          } else {
             showToast("ระบบบันทึกอัตโนมัติแล้ว (Auto-Saved)", "info");
          }
      }).saveAllInOneWithConfig(payload);

  } catch(e) {
      isSavingScores = false; 
      if(btn) { btn.disabled = false; btn.innerHTML = originalText; btn.className = originalBtnClass; }
      if(!isSilent) alert("❌ UI Error: " + e.message);
      console.error(e);
  }
}

function handleCellNav(e) {
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    const input = e.target;
    const row = parseInt(input.dataset.row);
    const col = parseInt(input.dataset.col);
    let nextRow = row; let nextCol = col;
    if (e.key === 'ArrowUp') nextRow--;
    if (e.key === 'ArrowDown') nextRow++;
    if (e.key === 'ArrowLeft') nextCol--;
    if (e.key === 'ArrowRight') nextCol++;
    const nextInput = document.querySelector(`.nav-input[data-row="${nextRow}"][data-col="${nextCol}"]`);
    if (nextInput) { e.preventDefault(); nextInput.focus(); nextInput.select(); }
  }
}

// ตัวแปรจำสถานะการลากเมาส์
let isDraggingSGS = false;
let startSGS = { r: -1, c: -1 };
let endSGS = { r: -1, c: -1 };
window.sgsCurrentMode = 'normal'; 
window.sgsScrollInterval = null; 
window.sgsGlobalListenersAdded = false;

// 🌟 2. วาดตาราง SGS (มีปุ่มสลับโหมดให้เลือก)
function renderSGSGrid(mode) {
  window.sgsCurrentMode = mode;
  let sortedStudents = [...currentScoreStudents].sort((a, b) => {
      let idA = parseInt(String(a[0]).replace(/[^0-9]/g, '')) || 0;
      let idB = parseInt(String(b[0]).replace(/[^0-9]/g, '')) || 0;
      return idA - idB;
  });

  // วาดปุ่มสลับโหมดด้านบน
  let buttonsHtml = `
     <div class="d-flex w-100 justify-content-between mb-3 align-items-center">
         <div class="btn-group shadow-sm">
             <button class="btn btn-sm ${mode === 'normal' ? 'btn-secondary' : 'btn-outline-secondary'} fw-bold px-3" onclick="renderSGSGrid('normal')"><i class="fas fa-table me-2"></i>ตาราง ปพ.5 เดิม</button>
             <button class="btn btn-sm ${mode === 'magic' ? 'btn-success' : 'btn-outline-success'} fw-bold px-3" onclick="renderSGSGrid('magic')"><i class="fas fa-magic me-2"></i>แปลงเป็น SGS (แยก 7 ช่อง)</button>
         </div>
         <button class="btn btn-primary fw-bold shadow-sm px-4 rounded-pill" onclick="copySGSSelected()"><i class="fas fa-copy me-2"></i>คัดลอกส่วนที่เลือก (Ctrl+C)</button>
     </div>
     <div class="alert alert-info border-0 shadow-sm small py-2 mb-3">
       <i class="fas fa-info-circle me-1"></i> <b>อัปเดตใหม่:</b> ระบบจะดึง "คะแนนดิบ" ที่ครูกรอกมาซอยแบ่งลง 7 ช่องให้โดยไม่แปลงสัดส่วน <b>รับประกันคะแนนรวมและเกรดตรงกับตารางหลักเป๊ะ 100%</b>
       <br><i class="fas fa-mouse-pointer me-1 mt-2"></i> <b>ทริค:</b> คลิกค้างแล้วลากคลุมช่องคะแนนที่ต้องการ (เหมือน Excel) จอจะเลื่อนอัตโนมัติ แล้วกด <b>Ctrl+C</b> เพื่อคัดลอก
     </div>
  `;
  document.getElementById('sgsActionButtons').innerHTML = buttonsHtml;

  // วาดหัวตาราง
  let theadHtml = `<tr>
    <th class="align-middle bg-light text-muted" style="width: 50px;">ที่</th>
    <th class="align-middle text-primary bg-light" style="width: 100px;">รหัสนักเรียน</th>
    <th class="align-middle text-start bg-light" style="min-width: 150px;">ชื่อ-สกุล</th>`;

  if (mode === 'normal') {
      currentScoreConfig.indicators.forEach((ind) => {
         theadHtml += `<th class="bg-light">${ind.name}<br><small class="text-muted">(${ind.score})</small></th>`;
      });
      let maxMid = parseFloat(document.getElementById('edit-ratio-m')?.innerText) || 20;
      let maxFin = parseFloat(document.getElementById('edit-ratio-e')?.innerText) || 30;
      theadHtml += `<th class="table-warning">กลางภาค<br><small class="text-muted">(${maxMid})</small></th>`;
      theadHtml += `<th class="table-danger">ปลายภาค<br><small class="text-muted">(${maxFin})</small></th>`;
  } else {
      let magicHeaders = ["ย่อย 1", "ย่อย 2", "ย่อย 3", "กลางภาค", "ย่อย 4", "ย่อย 5", "ปลายภาค"];
      magicHeaders.forEach(h => {
          if (h.includes("กลางภาค")) theadHtml += `<th class="table-warning">${h}</th>`;
          else if (h.includes("ปลายภาค")) theadHtml += `<th class="table-danger">${h}</th>`;
          else theadHtml += `<th class="bg-light">${h}</th>`;
      });
      theadHtml += `<th class="bg-secondary text-white border-start" style="width:60px;">รวม</th><th class="bg-success text-white" style="width:60px;">เกรด</th>`;
  }
  theadHtml += `</tr>`;
  document.getElementById('sgsPreviewHead').innerHTML = theadHtml;

  // วาดข้อมูลนักเรียน
  let tbodyHtml = '';
  sortedStudents.forEach((std, rIdx) => {
      const safeStdId = normID(std[0]);
      let rowHtml = `<tr>
        <td class="text-muted text-center">${rIdx + 1}</td>
        <td class="fw-bold text-primary font-monospace text-center">${std[0]}</td>
        <td class="text-start text-truncate" style="max-width: 150px;">${std[2]}</td>`;

      let cIdx = 0;
      let hasData = false;
      
      let rawMidStr = document.querySelector(`.midterm-std-${safeStdId}`)?.value || '';
      let rawMidReStr = document.querySelector(`.midterm-re-std-${safeStdId}`)?.value || '';
      if (rawMidStr !== '' || rawMidReStr !== '') hasData = true;
      let finalMid = (parseFloat(rawMidReStr) || 0) > 0 ? (parseFloat(rawMidReStr) || 0) : (parseFloat(rawMidStr) || 0);

      let rawFinStr = document.querySelector(`.final-std-${safeStdId}`)?.value || '';
      if (rawFinStr !== '') hasData = true;
      let finalFin = parseFloat(rawFinStr) || 0;

      let rawForms = [];
      let rawFormSum = 0;
      currentScoreConfig.indicators.forEach((ind, idx) => {
          let formStr = document.querySelectorAll(`.formative-std-${safeStdId}`)[idx]?.value || '';
          if (formStr !== '') hasData = true;
          rawForms.push(formStr);
          rawFormSum += parseFloat(formStr) || 0;
      });

      if (mode === 'normal') {
          rawForms.forEach(val => {
              rowHtml += `<td class="sgs-cell align-middle fs-6" data-r="${rIdx}" data-c="${cIdx++}">${val}</td>`;
          });
          rowHtml += `<td class="sgs-cell align-middle fs-6 table-warning fw-bold text-dark" data-r="${rIdx}" data-c="${cIdx++}">${hasData ? (rawMidReStr !== '' ? rawMidReStr : rawMidStr) : ''}</td>`;
          rowHtml += `<td class="sgs-cell align-middle fs-6 table-danger fw-bold text-dark" data-r="${rIdx}" data-c="${cIdx++}">${hasData ? rawFinStr : ''}</td>`;
      } else {
          if (!hasData) {
              for(let i=0; i<7; i++) rowHtml += `<td class="sgs-cell align-middle" data-r="${rIdx}" data-c="${cIdx++}"></td>`;
              rowHtml += `<td class="align-middle fw-bold text-muted bg-light border-start">-</td><td class="align-middle fw-bold text-muted bg-light">-</td>`;
          } else {
              // 🌟 1. ดึงคะแนนดิบ 100% ไม่แปลสัดส่วน
              let sgsMid = finalMid; 
              let sgsFin = finalFin;
              let sgsFormTotal = rawFormSum; 

              // 🌟 2. กระจายลง 5 ช่องให้เนียนที่สุด
              let forms = [0, 0, 0, 0, 0];
              let base = Math.floor(sgsFormTotal / 5);
              let rem = Math.round((sgsFormTotal - (base * 5)) * 100) / 100;

              for(let i=0; i<5; i++) forms[i] = base;
              
              let idx = 0;
              while (rem >= 1 && idx < 5) {
                  forms[idx] += 1;
                  rem -= 1;
                  idx++;
              }
              if (rem > 0 && idx < 5) {
                  forms[idx] += parseFloat(rem.toFixed(2));
              }

              // ลำดับช่อง: ย่อย1, ย่อย2, ย่อย3, กลางภาค, ย่อย4, ย่อย5, ปลายภาค
              let sgsRow = [forms[0], forms[1], forms[2], sgsMid, forms[3], forms[4], sgsFin];

              sgsRow.forEach((val, index) => {
                  let bgClass = '';
                  if (index === 3) bgClass = 'table-warning fw-bold text-dark';
                  else if (index === 6) bgClass = 'table-danger fw-bold text-dark';
                  rowHtml += `<td class="sgs-cell align-middle fs-6 ${bgClass}" data-r="${rIdx}" data-c="${cIdx++}">${val}</td>`;
              });

              // ตรวจสอบรวมและเกรด
              let totalSgs = Math.round((sgsFormTotal + sgsMid + sgsFin) * 100) / 100;
              let gradeSgs = calculateGrade(totalSgs);
              let gradeClass = totalSgs < 50 ? 'text-danger' : 'text-success';
              
              rowHtml += `<td class="align-middle fw-bold bg-light border-start text-dark">${totalSgs}</td>`;
              rowHtml += `<td class="align-middle fw-bold bg-light ${gradeClass} fs-5">${gradeSgs}</td>`;
          }
      }

      rowHtml += `</tr>`;
      tbodyHtml += rowHtml;
  });

  document.getElementById('sgsPreviewBody').innerHTML = tbodyHtml;
  initSGSDragSelection(); 
}

// 🌟 3. ระบบจับเมาส์ลากคลุมดำ (มี Auto-Scroll)
function initSGSDragSelection() {
    const tbody = document.getElementById('sgsPreviewBody');
    if(!tbody) return;

    // เคลียร์ Event เดิมก่อน
    const newTbody = tbody.cloneNode(true);
    tbody.parentNode.replaceChild(newTbody, tbody);

    newTbody.addEventListener('mousedown', function(e) {
        const td = e.target.closest('.sgs-cell');
        if(!td) return;
        isDraggingSGS = true;
        startSGS = { r: parseInt(td.dataset.r), c: parseInt(td.dataset.c) };
        endSGS = { r: parseInt(td.dataset.r), c: parseInt(td.dataset.c) };
        drawSGSSelection(newTbody);
        e.preventDefault(); 
    });

    newTbody.addEventListener('mouseover', function(e) {
        if(!isDraggingSGS) return;
        const td = e.target.closest('.sgs-cell');
        if(!td) return;
        endSGS = { r: parseInt(td.dataset.r), c: parseInt(td.dataset.c) };
        drawSGSSelection(newTbody);
    });

    if (!window.sgsGlobalListenersAdded) {
        window.sgsGlobalListenersAdded = true;
        
        document.addEventListener('mousemove', function(e) {
            if(!isDraggingSGS) return;
            const scrollContainer = document.getElementById('sgsPreviewTable')?.parentElement;
            if(!scrollContainer) return;
            
            const rect = scrollContainer.getBoundingClientRect();
            const threshold = 50; 
            
            clearInterval(window.sgsScrollInterval); 
            
            if (e.clientY >= rect.bottom - threshold && e.clientY <= rect.bottom + 50) {
                window.sgsScrollInterval = setInterval(() => {
                    scrollContainer.scrollTop += 20; 
                    updateSGSSelectionFromPoint(e.clientX, Math.min(e.clientY, rect.bottom - 10)); 
                }, 30);
            } 
            else if (e.clientY <= rect.top + threshold + 40 && e.clientY >= rect.top - 50) {
                window.sgsScrollInterval = setInterval(() => {
                    scrollContainer.scrollTop -= 20; 
                    updateSGSSelectionFromPoint(e.clientX, Math.max(e.clientY, rect.top + 50));
                }, 30);
            }
        });

        document.addEventListener('mouseup', function() {
            isDraggingSGS = false;
            clearInterval(window.sgsScrollInterval); 
        });
    }
}

function updateSGSSelectionFromPoint(x, y) {
    const elements = document.elementsFromPoint(x, y);
    if (!elements) return;
    const td = elements.find(el => el.classList && el.classList.contains('sgs-cell'));
    if (td) {
        endSGS = { r: parseInt(td.dataset.r), c: parseInt(td.dataset.c) };
        const currentTbody = document.getElementById('sgsPreviewBody');
        if(currentTbody) drawSGSSelection(currentTbody);
    }
}

function drawSGSSelection(tbody) {
    const minR = Math.min(startSGS.r, endSGS.r);
    const maxR = Math.max(startSGS.r, endSGS.r);
    const minC = Math.min(startSGS.c, endSGS.c);
    const maxC = Math.max(startSGS.c, endSGS.c);

    tbody.querySelectorAll('.sgs-cell').forEach(td => {
        const r = parseInt(td.dataset.r);
        const c = parseInt(td.dataset.c);
        if (r >= minR && r <= maxR && c >= minC && c <= maxC) {
            td.classList.add('sgs-selected');
        } else {
            td.classList.remove('sgs-selected');
        }
    });
}

// 🌟 4. ดักจับปุ่ม Ctrl+C เพื่อคัดลอก

// ฟังก์ชันดูดข้อมูลลง Clipboard
window.copySGSSelected = function() {
    const tbody = document.getElementById('sgsPreviewBody');
    if(!tbody) return;

    const selectedCells = tbody.querySelectorAll('.sgs-selected');
    if(selectedCells.length === 0) return alert('⚠️ กรุณาคลิกค้างแล้วลากคลุมช่องคะแนนที่ต้องการก่อนคัดลอกครับ');

    const minR = Math.min(startSGS.r, endSGS.r);
    const maxR = Math.max(startSGS.r, endSGS.r);
    const minC = Math.min(startSGS.c, endSGS.c);
    const maxC = Math.max(startSGS.c, endSGS.c);

    let copyString = "";
    for(let r = minR; r <= maxR; r++) {
        let rowVals = [];
        for(let c = minC; c <= maxC; c++) {
            const td = tbody.querySelector(`.sgs-cell[data-r="${r}"][data-c="${c}"]`);
            if (td && td.classList.contains('sgs-selected')) {
                rowVals.push(td.innerText.trim());
            } else {
                rowVals.push(""); 
            }
        }
        copyString += rowVals.join('\t') + '\n';
    }

    navigator.clipboard.writeText(copyString.trimEnd()).then(() => {
        if (typeof showToast === 'function') showToast('✅ คัดลอกตารางลง Clipboard เรียบร้อย! (พร้อมวาง)', 'success');
        else alert('คัดลอกสำเร็จ! นำไปคลิกขวาวางใน SGS ได้เลยครับ');
    }).catch(err => alert('เบราว์เซอร์ไม่อนุญาตให้คัดลอก: ' + err));
}

// ==========================================
// ⚡ ฟังก์ชันยิง Auto-Save เมื่อครูเปลี่ยน Dropdown ร/มส
// ==========================================
function updateRemarkInstant(stdId, selectElement) {
   const user = getSessionUser();
   const val = document.getElementById('scoreClassSelect').value;
   if(!val) return;
   
   const item = JSON.parse(val);
   const subjectCode = item[0];
   const remarkVal = selectElement.value;

   // ทำให้ช่องดูจางลงนิดนึง เพื่อบอกว่า "กำลังบันทึกอยู่นะ"
   selectElement.style.opacity = '0.5';

   // ยิงข้อมูลตรงไปหาหลังบ้าน
   safeRun(3).withSuccessHandler(res => {
      selectElement.style.opacity = '1';
      if(res.success) {
         let msg = res.val === '' ? 'ล้างค่าหมายเหตุสำเร็จ' : `บันทึก "${res.val}" สำเร็จ!`;
         showToast(msg, "success"); // โชว์เด้งเตือนสีเขียว
      } else {
         showToast("❌ ขัดข้อง: " + res.error, "danger");
      }
   }).saveStudentRemarkDirectly(stdId, subjectCode, user.currentTerm, user.currentYear, remarkVal);
}
